<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WealthWise – Smart Portfolio Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e2d45;
      --gold: #f0b429;
      --gold-light: #fcd34d;
      --teal: #0d9488;
      --teal-light: #2dd4bf;
      --text: #e8edf5;
      --text-muted: #7a8ba0;
      --red: #ef4444;
      --green: #10b981;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(240,180,41,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; left: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(13,148,136,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--gold), var(--teal));
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      background: linear-gradient(120deg, var(--gold-light), var(--teal-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--gold);
      color: #0a0f1e;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: var(--gold); }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--gold), #e8a020);
      border: none;
      border-radius: 10px;
      color: #0a0f1e;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }

    .form-section { display: none; }
    .form-section.active { display: block; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="brand">
      <div class="brand-logo">💰</div>
      <h1>WealthWise</h1>
      <p>Your personal finance command centre</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <div id="error-msg" class="error-msg"></div>

      <!-- Login Form -->
      <div id="login-section" class="form-section active">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn" onclick="login()">Sign In →</button>
      </div>

      <!-- Register Form -->
      <div id="register-section" class="form-section">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Rajesh Kumar" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" />
        </div>
        <button class="btn" onclick="register()">Create Account →</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    // If already logged in, redirect
    if (localStorage.getItem('ww_token')) {
      window.location.href = '/pages/dashboard.html';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('login-section').classList.toggle('active', tab === 'login');
      document.getElementById('register-section').classList.toggle('active', tab === 'register');
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showError('Please fill all fields');

      try {
        const res = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) return showError(data.error);
        localStorage.setItem('ww_token', data.token);
        localStorage.setItem('ww_name', data.name);
        window.location.href = '/pages/dashboard.html';
      } catch (e) {
        showError('Connection error. Is the server running?');
      }
    }

    async function register() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      if (!name || !email || !password) return showError('Please fill all fields');

      try {
        const res = await fetch(`${API}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) return showError(data.error);
        localStorage.setItem('ww_token', data.token);
        localStorage.setItem('ww_name', data.name);
        window.location.href = '/pages/dashboard.html';
      } catch (e) {
        showError('Connection error. Is the server running?');
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const active = document.querySelector('.form-section.active').id;
        if (active === 'login-section') login();
        else register();
      }
    });
  </script>
</body>
</html>
